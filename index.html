<html lang="en" class="dark-theme">
<head>
    <title>Zekoro - Coming Soon</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/FoundationCss.css">
    <link rel="stylesheet" href="/ReactStyleGuide.css">
    <link rel="stylesheet" href="/StyleGuide.css">
    <link rel="stylesheet" href="/Builder.css">
    <link rel="stylesheet" href="/Navigation.css">
    <link rel="stylesheet" href="/Footer.css">

    <link rel="icon" type="image/png" href="/images/favicon.png">

    <style>
        body, #wrap {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('/images/background-login.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .container-main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 44px);
        }

        .coming-soon-box {
            width: 420px;
            padding: 40px;
            border-radius: 16px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            text-align: center;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            opacity: 0.85;
            margin-bottom: 25px;
        }

        .status {
            font-size: 16px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            margin-bottom: 20px;
        }

        .team {
            font-size: 14px;
            opacity: 0.7;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff9d;
            margin-right: 6px;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .navbar {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: rgba(0,0,0,0.6);
            color: white;
        }

        .navbar img {
            height: 28px;
        }
    </style>

    <script>
        (function () {
            var t = localStorage.getItem('zekoro-theme');
            document.documentElement.className = (t === 'light') ? 'light-theme' : 'dark-theme';
        })();
    </script>
</head>

<body>
<div id="wrap">

    <!-- NAVBAR -->
    <div class="navbar">
        <img src="https://zekoro.serversiding.pro/images/zekoro.png" alt="Zekoro">
    </div>

    <!-- MAIN -->
    <main class="container-main">
        <div class="coming-soon-box">

            <img class="logo" src="https://zekoro.serversiding.pro/images/zekoro.png" alt="Logo">

            <div class="title">Coming Soon</div>

            <div class="subtitle">
                Zekoro is currently under development
            </div>

            <div class="status">
                <span class="dot"></span>
                Now being worked on by Redwing team
            </div>

            <div class="team">
                Please check back later for updates.
            </div>

        </div>
    </main>

</div>
</body>
</html>
